name: py-ci

on:
  push:
  pull_request:

jobs:
  py:
    runs-on: ubuntu-latest
    env:
      PDM_IGNORE_SAVED_PYTHON: "1"
      PDM_VENV_IN_PROJECT: "1"
    defaults:
      run:
        working-directory: py
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install patchelf
        run: sudo apt-get update && sudo apt-get install -y patchelf
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rs -> rs/target
      - run: python -m pip install -U pip pdm
      - run: pdm sync -G dev --no-self
      - run: pdm run python -c "import sys; print(sys.executable)"
      - run: pdm run uv --version
      - run: pdm run ruff check src tests scripts
      - run: pdm run pyright src
      - name: Build wheel artifact
        run: |
          rm -rf dist dist-repaired
          pdm run python -m build --wheel --installer uv
          mkdir -p dist-repaired
          pdm run uv tool run --from auditwheel auditwheel repair dist/axiomkit-*.whl -w dist-repaired
          rm -f dist/axiomkit-*.whl
          mv dist-repaired/*.whl dist/
      - name: Validate wheel is binary and ships Rust extensions
        run: |
          pdm run python scripts/validate_wheel.py --dist-dir dist
      - name: Package QA On Built Wheel
        run: |
          pdm run python scripts/run_package_qa.py --dist-dir dist --tests-dir tests
