name: py-ci

on:
  push:
  pull_request:

jobs:
  py:
    runs-on: ubuntu-latest
    env:
      PDM_IGNORE_SAVED_PYTHON: "1"
      PDM_VENV_IN_PROJECT: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install tooling
        run: python -m pip install -U pip pdm cibuildwheel==3.2.1

      - run: pdm sync -G dev --no-self
      - run: pdm run python -c "import sys; print(sys.executable)"
      - run: pdm run uv --version
      - run: pdm run ruff check python tests scripts
      - run: pdm run pyright python

      - name: Clean local packaging artifacts
        run: |
          rm -rf __pypackages__ .pdm-build .pytest_cache .ruff_cache dist build

      - name: Build manylinux_2_28 wheel artifact
        env:
          CIBW_ARCHS_LINUX: x86_64
          CIBW_BUILD: cp313-*
          CIBW_BUILD_VERBOSITY: "1"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_ENVIRONMENT_LINUX: PATH=/root/.cargo/bin:$PATH
          CIBW_BEFORE_ALL_LINUX: >-
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs |
            sh -s -- -y --profile minimal --default-toolchain stable
        run: |
          python -m cibuildwheel --output-dir dist .

      - name: Validate wheel is manylinux_2_28 abi3 and ships Rust extensions
        run: |
          pdm run python scripts/validate_wheel.py --dist-dir dist

      - name: Package QA On Built Wheel
        run: |
          pdm run python scripts/run_package_qa.py --dist-dir dist --tests-dir tests
