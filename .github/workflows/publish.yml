name: py-publish

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: py-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PDM_IGNORE_SAVED_PYTHON: "1"
      PDM_VENV_IN_PROJECT: "1"
    defaults:
      run:
        working-directory: py
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rs -> rs/target

      - name: Install PDM
        run: python -m pip install -U pip pdm

      - name: Verify tag is canonical PEP 440
        run: |
          python - <<'PY'
          from packaging.version import InvalidVersion, Version
          raw_tag = "${{ github.ref_name }}"

          if raw_tag.startswith("v") or raw_tag.startswith("py-v"):
              raise SystemExit(
                  f"Tag must be plain PEP 440 version (e.g. 0.0.22), got {raw_tag!r}."
              )

          try:
              parsed = Version(raw_tag)
          except InvalidVersion as e:
              raise SystemExit(f"Invalid PEP 440 tag: {raw_tag!r}") from e

          if str(parsed) != raw_tag:
              raise SystemExit(
                  f"Tag must already be canonical PEP 440, got {raw_tag!r}, canonical={str(parsed)!r}."
              )

          print(f"Tag check passed: {raw_tag}")
          PY

      - name: Sync dev dependencies
        run: pdm sync -G dev --no-self

      - name: Run checks
        run: |
          pdm run ruff check src tests scripts
          pdm run pyright src

      - name: Build artifacts
        run: |
          rm -rf dist
          pdm run python -m build --wheel --installer uv

      - name: Verify built wheel matches tag and contains Rust extensions
        run: |
          pdm run python scripts/validate_wheel.py \
            --dist-dir dist \
            --expected-version "${{ github.ref_name }}"

      - name: Package QA On Built Wheel
        run: |
          pdm run python scripts/run_package_qa.py --dist-dir dist --tests-dir tests

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: py-dist
          path: py/dist/
          if-no-files-found: error

  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: testpypi
      url: https://test.pypi.org/p/axiomkit
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: py-dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist
          skip-existing: true

  publish-pypi:
    needs: publish-testpypi
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/p/axiomkit
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: py-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
