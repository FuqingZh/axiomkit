name: py-publish

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: py-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PDM_IGNORE_SAVED_PYTHON: "1"
      PDM_VENV_IN_PROJECT: "1"
    defaults:
      run:
        working-directory: py
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rs -> rs/target

      - name: Install PDM
        run: python -m pip install -U pip pdm

      - name: Verify tag is canonical PEP 440
        run: |
          python - <<'PY'
          from packaging.version import InvalidVersion, Version
          raw_tag = "${{ github.ref_name }}"

          if raw_tag.startswith("v") or raw_tag.startswith("py-v"):
              raise SystemExit(
                  f"Tag must be plain PEP 440 version (e.g. 0.0.22), got {raw_tag!r}."
              )

          try:
              parsed = Version(raw_tag)
          except InvalidVersion as e:
              raise SystemExit(f"Invalid PEP 440 tag: {raw_tag!r}") from e

          if str(parsed) != raw_tag:
              raise SystemExit(
                  f"Tag must already be canonical PEP 440, got {raw_tag!r}, canonical={str(parsed)!r}."
              )

          print(f"Tag check passed: {raw_tag}")
          PY

      - name: Sync dev dependencies
        run: pdm sync -G dev --no-self

      - name: Run checks
        run: |
          pdm run pytest -q tests
          pdm run ruff check src tests
          pdm run pyright src

      - name: Build artifacts
        run: |
          rm -rf dist
          pdm build --no-sdist

      - name: Verify built wheel matches tag and contains Rust extensions
        run: |
          python - <<'PY'
          import pathlib
          import zipfile

          tag = "${{ github.ref_name }}"
          dist = pathlib.Path("dist")
          wheels = list(dist.glob("axiomkit-*.whl"))
          if not wheels:
              raise SystemExit("Expected at least one wheel artifact in dist/.")

          if not any(w.name.startswith(f"axiomkit-{tag}-") for w in wheels):
              raise SystemExit(
                  f"No wheel matches tag version {tag!r}. Found: {[w.name for w in wheels]}"
              )

          for wheel in wheels:
              if wheel.name.endswith("none-any.whl"):
                  raise SystemExit(f"Wheel must be platform-specific, got: {wheel.name}")

              with zipfile.ZipFile(wheel) as zf:
                  names = zf.namelist()

              def has_ext(prefix: str) -> bool:
                  return any(
                      name.startswith(prefix)
                      and name.endswith((".so", ".pyd", ".dylib"))
                      for name in names
                  )

              if not has_ext("axiomkit/io/fs/_axiomkit_io_fs_rs"):
                  raise SystemExit(f"{wheel.name} missing fs Rust extension.")
              if not has_ext("axiomkit/io/xlsx/_axiomkit_io_xlsx_rs"):
                  raise SystemExit(f"{wheel.name} missing xlsx Rust extension.")

          print(f"Wheel validation passed for tag: {tag}")
          PY

      - name: Smoke install wheel artifact
        run: |
          python - <<'PY'
          import pathlib
          import subprocess
          import tempfile

          wheel = sorted(pathlib.Path("dist").glob("axiomkit-*.whl"))[0]
          uri = wheel.resolve().as_uri()
          venv_dir = pathlib.Path(tempfile.mkdtemp(prefix="axiomkit-publish-venv-"))

          subprocess.run(["python", "-m", "venv", str(venv_dir)], check=True)
          py = venv_dir / "bin" / "python"
          subprocess.run([str(py), "-m", "pip", "install", "-U", "pip"], check=True)
          subprocess.run([str(py), "-m", "pip", "install", f"axiomkit[all] @ {uri}"], check=True)

          script = r'''
          from pathlib import Path
          import polars as pl
          from axiomkit.io.fs._rs_bridge import is_rs_backend_available as fs_backend_ok
          from axiomkit.io.xlsx._rs_bridge import is_rs_backend_available as xlsx_backend_ok
          from axiomkit.io.xlsx import XlsxWriter

          if not fs_backend_ok():
              raise SystemExit("fs backend unavailable after wheel install")
          if not xlsx_backend_ok():
              raise SystemExit("xlsx backend unavailable after wheel install")

          out = Path("/tmp/axiomkit_publish_smoke.xlsx")
          with XlsxWriter(out) as writer:
              writer.write_sheet(
                  pl.DataFrame({"a": [1], "b": ["x"]}),
                  "S",
                  df_header=pl.DataFrame({"a": ["列A", "A"], "b": ["列B", "B"]}),
              )
          if not out.exists() or out.stat().st_size <= 0:
              raise SystemExit("xlsx smoke output missing")
          '''
          subprocess.run([str(py), "-c", script], check=True)
          PY

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: py-dist
          path: py/dist/
          if-no-files-found: error

  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: testpypi
      url: https://test.pypi.org/p/axiomkit
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: py-dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist
          skip-existing: true

  publish-pypi:
    needs: publish-testpypi
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/p/axiomkit
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: py-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
