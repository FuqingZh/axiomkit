name: py-publish

env:
  MANYLINUX_RUST_IMAGE: ghcr.io/fuqingzh/axiomkit-manylinux_2_28-rust

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: py-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-wheel-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install wheel builder
        run: python -m pip install -U pip cibuildwheel==3.2.1

      - name: Clean local packaging artifacts
        run: |
          rm -rf __pypackages__ .pdm-build .pytest_cache .ruff_cache dist build

      - name: Restore Cargo build cache
        uses: actions/cache@v4
        with:
          path: |
            .cargo-ci/x86_64
            target/cibuildwheel-x86_64
          key: >-
            cargo-cibuildwheel-${{ runner.os }}-x86_64-stable-${{
            hashFiles('Cargo.lock', 'crates/**/Cargo.toml') }}

      - name: Sync package version from release tag
        if: github.ref_type == 'tag'
        run: python scripts/sync_release_version.py --version "${{ github.ref_name }}"

      - name: Build wheel
        env:
          CIBW_ARCHS_LINUX: x86_64
          CIBW_BUILD: cp313-*
          CIBW_BUILD_VERBOSITY: "1"
          CIBW_MANYLINUX_X86_64_IMAGE: ${{ env.MANYLINUX_RUST_IMAGE }}:x86_64
          CIBW_ENVIRONMENT_LINUX: >-
            CARGO_HOME=/project/.cargo-ci/x86_64
            CARGO_TARGET_DIR=/project/target/cibuildwheel-x86_64
        run: python -m cibuildwheel --output-dir dist .

      - name: Validate built wheel
        run: python scripts/validate_wheel.py --dist-dir dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: py-dist-wheel-x86_64
          path: dist/*manylinux_2_28*x86_64*.whl
          if-no-files-found: error

  build-wheel-aarch64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install wheel builder
        run: python -m pip install -U pip cibuildwheel==3.2.1

      - name: Clean local packaging artifacts
        run: |
          rm -rf __pypackages__ .pdm-build .pytest_cache .ruff_cache dist build

      - name: Restore Cargo build cache
        uses: actions/cache@v4
        with:
          path: |
            .cargo-ci/aarch64
            target/cibuildwheel-aarch64
          key: >-
            cargo-cibuildwheel-${{ runner.os }}-aarch64-stable-${{
            hashFiles('Cargo.lock', 'crates/**/Cargo.toml') }}

      - name: Sync package version from release tag
        if: github.ref_type == 'tag'
        run: python scripts/sync_release_version.py --version "${{ github.ref_name }}"

      - name: Build wheel
        env:
          CIBW_ARCHS_LINUX: aarch64
          CIBW_BUILD: cp313-*
          CIBW_BUILD_VERBOSITY: "1"
          CIBW_MANYLINUX_AARCH64_IMAGE: ${{ env.MANYLINUX_RUST_IMAGE }}:aarch64
          CIBW_ENVIRONMENT_LINUX: >-
            CARGO_HOME=/project/.cargo-ci/aarch64
            CARGO_TARGET_DIR=/project/target/cibuildwheel-aarch64
        run: python -m cibuildwheel --output-dir dist .

      - name: Validate built wheel
        run: python scripts/validate_wheel.py --dist-dir dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: py-dist-wheel-aarch64
          path: dist/*manylinux_2_28*aarch64*.whl
          if-no-files-found: error

  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install sdist builder
        run: python -m pip install -U pip 'maturin>=1.11.5,<2.0' packaging

      - name: Clean local packaging artifacts
        run: |
          rm -rf __pypackages__ .pdm-build .pytest_cache .ruff_cache dist build

      - name: Sync package version from release tag
        if: github.ref_type == 'tag'
        run: python scripts/sync_release_version.py --version "${{ github.ref_name }}"

      - name: Verify tag is canonical PEP 440
        if: github.ref_type == 'tag'
        run: |
          python - <<'PY'
          from packaging.version import InvalidVersion, Version
          raw_tag = "${{ github.ref_name }}"

          if raw_tag.startswith("v") or raw_tag.startswith("py-v"):
              raise SystemExit(
                  f"Tag must be plain PEP 440 version (e.g. 0.0.22), got {raw_tag!r}."
              )

          try:
              parsed = Version(raw_tag)
          except InvalidVersion as e:
              raise SystemExit(f"Invalid PEP 440 tag: {raw_tag!r}") from e

          if str(parsed) != raw_tag:
              raise SystemExit(
                  f"Tag must already be canonical PEP 440, got {raw_tag!r}, canonical={str(parsed)!r}."
              )

          print(f"Tag check passed: {raw_tag}")
          PY

      - name: Build sdist
        run: maturin sdist --manifest-path crates/axiomkit_py/Cargo.toml --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: py-dist-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  verify-dist:
    needs:
      - build-wheel
      - build-sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: py-dist-wheel-*
          path: dist
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: py-dist-sdist
          path: dist

      - name: Validate aggregated dist artifacts
        run: |
          VALIDATE_ARGS=(--dist-dir dist --require-sdist)
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VALIDATE_ARGS+=(--expected-version "${GITHUB_REF_NAME}")
          fi
          python scripts/validate_wheel.py "${VALIDATE_ARGS[@]}"

      - name: Package QA on x86_64 wheel
        run: |
          python scripts/run_package_qa.py \
            --wheel dist/$(basename "$(find dist -maxdepth 1 -type f -name '*manylinux_2_28*x86_64*.whl' | head -n 1)") \
            --tests-dir tests

      - name: Package QA from sdist
        run: |
          python scripts/run_package_qa.py \
            --sdist dist/$(basename "$(find dist -maxdepth 1 -type f -name '*.tar.gz' | head -n 1)") \
            --tests-dir tests

      - name: Upload verified dist bundle
        uses: actions/upload-artifact@v4
        with:
          name: py-dist
          path: dist/
          if-no-files-found: error

  publish-testpypi:
    needs: verify-dist
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: testpypi
      url: https://test.pypi.org/p/axiomkit
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: py-dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist
          skip-existing: true
          attestations: false

  publish-pypi:
    needs: publish-testpypi
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/p/axiomkit
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: py-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
