name: manylinux-image

on:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/docker/manylinux-rust/**"
      - ".github/workflows/manylinux-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            base_image: quay.io/pypa/manylinux_2_28_x86_64
            platform: linux/amd64
          - arch: aarch64
            base_image: quay.io/pypa/manylinux_2_28_aarch64
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        if: matrix.arch == 'aarch64'
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish manylinux Rust image
        uses: docker/build-push-action@v6
        with:
          context: .github/docker/manylinux-rust
          file: .github/docker/manylinux-rust/Dockerfile
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
            RUST_TOOLCHAIN=stable
          platforms: ${{ matrix.platform }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/axiomkit-manylinux_2_28-rust:${{ matrix.arch }}
