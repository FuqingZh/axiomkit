name: manylinux-image

env:
  MANYLINUX_RUST_IMAGE: ghcr.io/fuqingzh/axiomkit-manylinux_2_28-rust

on:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/docker/manylinux-rust/**"
      - ".github/workflows/manylinux-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-image-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish manylinux Rust image
        uses: docker/build-push-action@v6
        with:
          context: .github/docker/manylinux-rust
          file: .github/docker/manylinux-rust/Dockerfile
          build-args: |
            BASE_IMAGE=quay.io/pypa/manylinux_2_28_x86_64
            RUST_TOOLCHAIN=stable
          platforms: linux/amd64
          push: true
          tags: ${{ env.MANYLINUX_RUST_IMAGE }}:x86_64

  build-image-aarch64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish manylinux Rust image
        uses: docker/build-push-action@v6
        with:
          context: .github/docker/manylinux-rust
          file: .github/docker/manylinux-rust/Dockerfile
          build-args: |
            BASE_IMAGE=quay.io/pypa/manylinux_2_28_aarch64
            RUST_TOOLCHAIN=stable
          platforms: linux/arm64
          push: true
          tags: ${{ env.MANYLINUX_RUST_IMAGE }}:aarch64
